<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>قصص وروايات</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#f5f5f5;
  --card:#ffffff;
  --text:#222;
  --sub:#777;
  --main:#ff6a00;
  --icon-color: #000000;
}

body.dark{
  --bg:#0f0f0f;
  --card:#1a1a1a;
  --text:#fff;
  --sub:#aaa;
  --icon-color: #ffffff;
}

body{
  margin:0;
  font-family:'Cairo',sans-serif;
  background:var(--bg);
  color:var(--text);
  transition: background 0.3s;
}

/* HEADER */
.header{
  padding:15px;
  background:var(--card);
  position:sticky;
  top:0;
  z-index:10;
}

h1{
  margin:0;
  text-align:center;
  width:100%;
  color:var(--main);
}

.search{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
  border:none;
  background:#eee;
  box-sizing: border-box;
}

.dark .search{
  background:#2a2a2a;
  color:#fff;
}

.container{
  max-width:600px;
  margin:auto;
}

.card{
  background:var(--card);
  margin:12px;
  padding:15px;
  border-radius:12px;
  cursor:pointer;
}

.title{
  font-weight:700;
  font-size:18px;
  text-align:center;
}

.desc{
  color:var(--sub);
  margin-top:8px;
  text-align:center;
  font-size:14px;
}

/* TOP CONTROLS */
.top-controls {
  position: absolute;
  top: 18px;
  left: 15px;
  display: flex;
  gap: 18px;
  z-index: 9999;
}

.icon-btn {
  background: none;
  border: none;
  cursor: pointer;
  padding: 0;
  display: flex;
  align-items: center;
  color: var(--icon-color);
  text-decoration: none;
}

.icon-btn svg {
  width: 22px;
  height: 22px;
  fill: currentColor;
}
</style>
</head>

<body>

<div class="top-controls">
  <a href="mailto:oxmokes@gmail.com" class="icon-btn">
    <svg viewBox="0 0 24 24"><path d="M12 1c-4.97 0-9 4.03-9 9v7c0 1.66 1.34 3 3 3h3v-8H5v-2c0-3.87 3.13-7 7-7s7 3.13 7 7v2h-4v8h3c1.66 0 3-1.34 3-3v-7c0-4.97-4.03-9-9-9z"/></svg>
  </a>

  <button class="icon-btn" onclick="toggleTheme()" id="theme-toggle"></button>
</div>

<div class="header">
  <h1>قصص وروايات</h1>
  <input class="search" placeholder="ابحث..." oninput="search(this.value)">
</div>

<div class="container" id="stories"></div>

<script>
const files = ["story1.txt", "story2.txt"];
const container = document.getElementById("stories");
const themeBtn = document.getElementById("theme-toggle");

let allStories = [];

// أيقونة الشمس (تظهر في الوضع الليلي)
const sunIcon = `<svg viewBox="0 0 24 24"><path d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1zM5.99 4.58a.996.996 0 00-1.41 0 .996.996 0 000 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41L5.99 4.58zm12.37 12.37a.996.996 0 00-1.41 0 .996.996 0 000 1.41l1.06 1.06c.39.39 1.03.39 1.41 0a.996.996 0 000-1.41l-1.06-1.06zm1.06-10.96a.996.996 0 000-1.41.996.996 0 00-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06zM7.05 18.36a.996.996 0 000-1.41.996.996 0 00-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06z"/></svg>`;

// أيقونة الهلال "المضبوطة" (تظهر في الوضع النهاري)
const moonIcon = `<svg viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>`;

function updateIcon() {
  if (document.body.classList.contains("dark")) {
    themeBtn.innerHTML = sunIcon;
  } else {
    themeBtn.innerHTML = moonIcon;
  }
}

function toggleTheme() {
  let isDark = document.body.classList.toggle("dark");
  localStorage.setItem("theme", isDark);
  updateIcon();
}

// جلب القصص
files.forEach(file => {
  fetch(file).then(r => r.text()).then(data => {
    let lines = data.split("\n");
    let title = "", content = "";
    lines.forEach(l => {
      if(l.startsWith("***") && l.endsWith("***")) title = l.replace(/\*/g,"");
      else content += l + " ";
    });
    allStories.push({file, title, desc: content.substring(0, 50) + "..."});
    render(allStories);
  });
});

function render(list) {
  container.innerHTML = "";
  list.forEach((s) => {
    let card = document.createElement("div");
    card.className = "card";
    card.onclick = () => location.href = "story.html?file=" + s.file;
    card.innerHTML = `<div class="title">${s.title}</div><div class="desc">${s.desc}</div>`;
    container.appendChild(card);
  });
}

function search(v) { render(allStories.filter(s => s.title.includes(v))); }

if (localStorage.getItem("theme") === "true") document.body.classList.add("dark");
updateIcon();
</script>

</body>
</html>
