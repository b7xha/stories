<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>قصص وحكم</title>

<style>
body {
    font-family: Arial;
    margin: 0;
    background: #f5f5f5;
    color: #222;
}

.dark {
    background: #111;
    color: #fff;
}

.header {
    padding: 15px;
    background: white;
}

.dark .header {
    background: #1a1a1a;
}

h1 {
    color: #ff6600;
}

.search {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
}

.card {
    background: white;
    margin: 10px;
    padding: 15px;
    border-radius: 10px;
    cursor: pointer;
}

.dark .card {
    background: #1e1e1e;
}

.title {
    font-weight: bold;
    font-size: 18px;
}

.desc {
    color: gray;
    margin-top: 5px;
}

.toggle {
    position: fixed;
    top: 10px;
    left: 10px;
    background: #ff6600;
    color: white;
    padding: 8px;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="toggle" onclick="toggleTheme()">🌙</div>

<div class="header">
    <h1>قصص وحكم</h1>
    <input class="search" placeholder="ادخل اسم القصة" oninput="search(this.value)">
</div>

<div id="stories"></div>

<script>

const files = [
    "story1.txt",
    "story2.txt"
];

const container = document.getElementById("stories");

let allStories = [];

files.forEach(file => {
    fetch(file)
    .then(res => res.text())
    .then(data => {

        const lines = data.split("\n");

        let mainTitle = "";
        let content = "";

        lines.forEach(line => {
            if(line.startsWith("***") && line.endsWith("***")) {
                mainTitle = line.replace(/\*/g, "");
            } else {
                content += line + " ";
            }
        });

        let desc = content.substring(0, 50) + "....";

        const story = {file, mainTitle, desc};
        allStories.push(story);

        render(allStories);
    });
});

function render(list){
    container.innerHTML = "";
    list.forEach(s => {
        const div = document.createElement("div");
        div.className = "card";
        div.onclick = () => {
            window.location.href = "story.html?file=" + s.file;
        };

        div.innerHTML = `
            <div class="title">${s.mainTitle}</div>
            <div class="desc">${s.desc}</div>
        `;

        container.appendChild(div);
    });
}

function search(val){
    const filtered = allStories.filter(s =>
        s.mainTitle.includes(val)
    );
    render(filtered);
}

function toggleTheme(){
    document.body.classList.toggle("dark");
}

</script>

</body>
</html>
