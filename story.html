  --bg:#fff;

  margin:0;

  text-align:center;
  width:100%;
  margin:10px 0;
  color:var(--main);
}

  text-align:center;
  color:#ffaa33;
}

  display:block;
  direction:ltr;

  color:#ff0000;
} 
  
p{
  line-height:2;
  margin:10px 0;
  text-align:right;
}

/* زر الثيم */
.toggle{
  position:fixed;
  top:15px;
  left:15px;
  background:var(--main);
  color:#fff;
  padding:10px 12px;
  border-radius:10px;
  cursor:pointer;
  z-index:9999;
  font-size:16px;
}

/* إعلان */

<body>



<div id="content"></div>

<script>

const file=new URLSearchParams(location.search).get("file");

fetch(file)
.then(r=>r.text())
.then(data=>{

  let lines=data.split("\n");
  let div=document.getElementById("content");

  lines.forEach(line=>{
    line=line.trim();

    if(line.startsWith("***")){
      let h1=document.createElement("h1");
      h1.textContent=line.replace(/\*/g,"");
      div.appendChild(h1);

    }else if(line.startsWith("**")){
      let h2=document.createElement("h2");
      h2.textContent=line.replace(/\*/g,"");
      div.appendChild(h2);

   }else if(line.startsWith("~~")){
      let m=document.createElement("m");
      m.textContent=line.replace(/\~~/g,"");
      div.appendChild(m); 
      
    }else if(line!==""){
      let p=document.createElement("p");
      p.textContent=line;
      div.appendChild(p);

    
 
 

      let ad=document.createElement("div");
      ad.className="ad";
      ad.innerHTML=`
<script>
atOptions = {
 'key':'dcff8a2cffdf0642c627a5bacf3a04fd',
 'format':'iframe',
 'height':60,
 'width':320
};
<\/script>
<script src="https://www.highperformanceformat.com/dcff8a2cffdf0642c627a5bacf3a04fd/invoke.js"><\/script>
`;
      div.appendChild(ad);
    }

  });

});

// ثيم
function toggleTheme(){
  let dark=!document.body.classList.contains("dark");
  document.body.classList.toggle("dark");
  localStorage.setItem("theme",dark);
}

if(localStorage.getItem("theme")==="true"){
  document.body.classList.add("dark");
}

</script>
