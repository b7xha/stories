<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>قصص وروايات</title>

<meta name="description" content="استمتع بقراءة مجموعة متنوعة من القصص والروايات المشوقة في مكان واحد، مع محتوى متجدد يناسب جميع الأذواق وسهل التصفح من أي جهاز.">

<meta property="og:title" content="قصص وروايات">
<meta property="og:description" content="استمتع بقراءة مجموعة متنوعة من القصص والروايات المشوقة في مكان واحد، مع محتوى متجدد يناسب جميع الأذواق وسهل التصفح من أي جهاز.">
<meta property="og:image" content="https://i.ibb.co/zTXjGDvv/1777845960043.png">
<meta property="og:type" content="website">

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#fff;
  --text:#222;
  --main:#ff6a00;
}

body.dark{
  --bg:#0f0f0f;
  --text:#fff;
}

body{
  margin:0;
  padding:15px;
  font-family:'Cairo',sans-serif;
  background:var(--bg);
  color:var(--text);
  max-width:600px;
  margin:auto;
}

h1{
  text-align:center;
  color:var(--main);
}

h2{
  text-align:right;
  color:#ffaa33;
}

h3{
  text-align:left;
  color:red;
}

p{
  line-height:2;
  text-align:right;
}

.ad{
  margin:15px 0;
  text-align:center;
}
</style>
</head>

<body>

<div id="content"></div>

<script>

const file=new URLSearchParams(location.search).get("file");

fetch(file)
.then(r=>r.text())
.then(data=>{

  let lines=data.split("\n");
  let div=document.getElementById("content");

  lines.forEach(line=>{
    line=line.trim();

    if(line.startsWith("***")){
      let h1=document.createElement("h1");
      h1.textContent=line.replace(/\*/g,"");
      div.appendChild(h1);

    }else if(line.startsWith("**")){
      let h2=document.createElement("h2");
      h2.textContent=line.replace(/\*/g,"");
      div.appendChild(h2);

    }else if(line.startsWith("~~")){
      let h3=document.createElement("h3");
      h3.textContent=line.replace(/\~~/g,"");
      div.appendChild(h3);

    }else if(line!==""){

      let p=document.createElement("p");
      p.textContent=line;
      div.appendChild(p);

      // إعلان واحد ثابت بعد الفقرة (بدون تكرار مشاكل)
      let ad=document.createElement("div");
      ad.className="ad";
      ad.innerHTML=`
<script>
atOptions = {
 'key':'dcff8a2cffdf0642c627a5bacf3a04fd',
 'format':'iframe',
 'height':60,
 'width':320
};
<\/script>
<script src="https://www.highperformanceformat.com/dcff8a2cffdf0642c627a5bacf3a04fd/invoke.js"><\/script>
`;
      div.appendChild(ad);
    }

  });

});

</script>

<!-- إعلانين في النهاية جنب بعض -->
<div style="display:flex; gap:10px; justify-content:center; flex-wrap:wrap; margin:20px 0;">

  <div class="ad">
    <script>
    atOptions = {
     'key':'0b7539a5227dc7b69da2ea94b0521ab6',
     'format':'iframe',
     'height':250,
     'width':300
    };
    </script>
    <script src="https://www.highperformanceformat.com/0b7539a5227dc7b69da2ea94b0521ab6/invoke.js"></script>
  </div>

  <div class="ad">
    <script>
    atOptions = {
     'key':'dcff8a2cffdf0642c627a5bacf3a04fd',
     'format':'iframe',
     'height':250,
     'width':300
    };
    </script>
    <script src="https://www.highperformanceformat.com/dcff8a2cffdf0642c627a5bacf3a04fd/invoke.js"></script>
  </div>

</div>

</body>
</html>
