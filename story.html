<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Story</title>

<style>
body {
    background: black;
    color: white;
    font-family: Arial;
    padding: 15px;
}

h1 {
    color: #ff6600;
}

h2 {
    color: #ffaa33;
}

p {
    line-height: 1.8;
}

.ad {
    margin: 15px 0;
    text-align: center;
}
</style>
</head>

<body>

<div id="content"></div>

<script>

const params = new URLSearchParams(location.search);
const file = params.get("file");

fetch(file)
.then(res => res.text())
.then(data => {

    const div = document.getElementById("content");

    const lines = data.split("\n");

    lines.forEach(line => {
        line = line.trim();

        if(line.startsWith("***") && line.endsWith("***")){
            const h1 = document.createElement("h1");
            h1.textContent = line.replace(/\*/g, "");
            div.appendChild(h1);

        } else if(line.startsWith("**") && line.endsWith("**")){
            const h2 = document.createElement("h2");
            h2.textContent = line.replace(/\*/g, "");
            div.appendChild(h2);

        } else if(line !== ""){
            const p = document.createElement("p");
            p.textContent = line;
            div.appendChild(p);

            // 🔥 إعلان شريطي
            const ad = document.createElement("div");
            ad.className = "ad";
            ad.innerHTML = `
<script>
atOptions = {
 'key' : 'dcff8a2cffdf0642c627a5bacf3a04fd',
 'format' : 'iframe',
 'height' : 60,
 'width' : 468
};
<\/script>
<script src="https://www.highperformanceformat.com/dcff8a2cffdf0642c627a5bacf3a04fd/invoke.js"><\/script>
`;
            div.appendChild(ad);
        }
    });

});

</script>

<!-- إعلان مربع واحد فقط -->

}, { once: true });
</script>

</body>
</html>
