<style>
:root{ --bg:#fff; --text:#222; --main:#ff6a00; }
body.dark{ --bg:#0f0f0f; --text:#fff; }
body{ margin:0; padding:15px; font-family:'Cairo',sans-serif; background:var(--bg); color:var(--text); max-width:600px; margin:auto; }
h1{ text-align:center; width:100%; margin:10px 0; color:var(--main); }
h2{ text-align:right; color:#ffaa33; margin-top: 20px; }
h3{ display:block; direction:ltr; text-align:left; color:#ff0000; } 
p{ line-height:2; margin:10px 0; text-align:right; }
.toggle{ position:fixed; top:15px; left:15px; background:var(--main); color:#fff; padding:10px 12px; border-radius:10px; cursor:pointer; z-index:9999; font-size:16px; }
.ad{ margin:15px 0; text-align:center; min-height: 60px; }
</style>
</head>

<body>

<div id="content"></div>

<script>
const file = new URLSearchParams(location.search).get("file");

fetch(file)
.then(r => r.text())
.then(data => {
  let lines = data.split("\n");
  let div = document.getElementById("content");

  lines.forEach(line => {
    line = line.trim();
    if (line === "") return;

    if (line.startsWith("***")) {
      let h1 = document.createElement("h1");
      h1.textContent = line.replace(/\*/g, "");
      div.appendChild(h1);

    } else if (line.startsWith("**")) {
      // 1. إعلان يظهر قبل النص الذي يبدأ بـ **
      let adBefore = document.createElement("div");
      adBefore.className = "ad";
      adBefore.innerHTML = `
        <script type="text/javascript">
          atOptions = { 'key':'dcff8a2cffdf0642c627a5bacf3a04fd', 'format':'iframe', 'height':60, 'width':320 };
        <\/script>
        <script type="text/javascript" src="https://www.highperformanceformat.com/dcff8a2cffdf0642c627a5bacf3a04fd/invoke.js"><\/script>
      `;
      div.appendChild(adBefore);

      // 2. العنوان الفرعي نفسه
      let h2 = document.createElement("h2");
      h2.textContent = line.replace(/\*/g, "");
      div.appendChild(h2);

    } else if (line.startsWith("~~")) {
      let h3 = document.createElement("h3");
      h3.textContent = line.replace(/\~~/g, "");
      div.appendChild(h3); 
      
    } else {
      // الفقرات العادية
      let p = document.createElement("p");
      p.textContent = line;
      div.appendChild(p);

      // إعلان يظهر بعد الفقرة العادية (اختياري، يمكنك حذفه إذا كان يسبب كثرة إعلانات)
      let adAfter = document.createElement("div");
      adAfter.className = "ad";
      adAfter.innerHTML = `
        <script type="text/javascript">
          atOptions = { 'key':'dcff8a2cffdf0642c627a5bacf3a04fd', 'format':'iframe', 'height':60, 'width':320 };
        <\/script>
        <script type="text/javascript" src="https://www.highperformanceformat.com/dcff8a2cffdf0642c627a5bacf3a04fd/invoke.js"><\/script>
      `;
      div.appendChild(adAfter);
    }
  });
});

function toggleTheme(){
  let dark = !document.body.classList.contains("dark");
  document.body.classList.toggle("dark");
  localStorage.setItem("theme", dark);
}
if(localStorage.getItem("theme") === "true"){
  document.body.classList.add("dark");
}
</script>
